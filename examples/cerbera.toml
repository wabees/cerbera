# cerbera example configuration.
#
# Each [[watch]] entry defines a path to monitor and the processes
# allowed to access it. Any other process triggers a warning (v0.1
# watch-only) or will be blocked (v1.0+ enforce).
#
# allow_processes: full executable paths as resolved by /proc/PID/exe.
# Use `readlink /proc/$$/exe` or `which <cmd>` to find the right path.
# Paths vary by distro and install method (apt, snap, flatpak, etc.).

[[watch]]
name = "chromium-profile"
path = "~/.config/chromium/Default"
allow_processes = ["/usr/bin/chromium"]
recursive = true

[[watch]]
name = "chrome-profile"
path = "~/.config/google-chrome/Default"
allow_processes = ["/opt/google/chrome/chrome"]
recursive = true

[[watch]]
name = "firefox-profiles"
path = "~/.mozilla/firefox"
# Firefox subprocesses (Web Content, RDD, etc.) all share the same exe.
allow_processes = ["/usr/lib/firefox/firefox"]
recursive = true

[[watch]]
name = "keepassxc-db"
path = "~/Documents/secrets.kdbx"
allow_processes = ["/usr/bin/keepassxc"]

[[watch]]
name = "ssh-keys"
path = "~/.ssh"
allow_processes = [
    "/usr/bin/ssh",
    "/usr/bin/ssh-agent",
    "/usr/bin/ssh-add",
    "/usr/bin/git",
    "/usr/bin/scp",
    "/usr/bin/sftp",
]
recursive = true

[[watch]]
name = "aws-credentials"
path = "~/.aws/credentials"
allow_processes = ["/usr/bin/aws", "/usr/bin/terraform"]

[[watch]]
name = "gh-config"
path = "~/.config/gh"
allow_processes = ["/usr/bin/gh"]
recursive = true
