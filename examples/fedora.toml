# OS-level protection for Fedora / RHEL / AlmaLinux / Rocky Linux.
# Covers system credential stores — not user home directories.
# Pair with home.toml for per-user paths (SSH keys, browser profiles, etc.).
#
# On Fedora 36+ and RHEL 9+, /usr/sbin is a symlink to /usr/bin.
# /proc/PID/exe resolves through symlinks — verify actual paths with:
#   readlink /proc/$(pgrep sshd | head -1)/exe
#
# WARNING: /etc/shadow entries must include every binary that authenticates
# users via PAM. A missing entry in enforce mode can lock users out.
# Always validate with `--watch-only` first.

# ── Password database ──────────────────────────────────────────────────────────

[[watch]]
name = "shadow"
path = "/etc/shadow"
allow_processes = [
    "/usr/bin/passwd",
    "/usr/bin/su",
    "/usr/bin/sudo",
    "/usr/bin/login",
    "/usr/bin/newgrp",
    "/usr/sbin/sshd",        # may resolve to /usr/bin/sshd on Fedora 36+
    "/usr/sbin/unix_chkpwd", # may resolve to /usr/bin/unix_chkpwd on Fedora 36+
]

[[watch]]
name = "gshadow"
path = "/etc/gshadow"
allow_processes = [
    "/usr/bin/passwd",
    "/usr/bin/newgrp",
    "/usr/sbin/groupadd",
    "/usr/sbin/groupmod",
]

# ── Privilege escalation config ────────────────────────────────────────────────

[[watch]]
name = "sudoers"
path = "/etc/sudoers"
allow_processes = [
    "/usr/bin/sudo",
    "/usr/sbin/visudo",
]

[[watch]]
name = "sudoers-d"
path = "/etc/sudoers.d"
allow_processes = [
    "/usr/bin/sudo",
    "/usr/sbin/visudo",
]
recursive = true

# ── SSH host keys ──────────────────────────────────────────────────────────────

[[watch]]
name = "ssh-host-keys"
path = "/etc/ssh"
allow_processes = [
    "/usr/sbin/sshd",        # may resolve to /usr/bin/sshd on Fedora 36+
]
recursive = true

# ── TLS private keys ───────────────────────────────────────────────────────────

[[watch]]
name = "ssl-private"
path = "/etc/pki/tls/private"
# Add the processes that use your TLS certificates.
# Run with --watch-only first to discover which processes access this path.
allow_processes = [
    # "/usr/sbin/nginx",
    # "/usr/sbin/httpd",
]
recursive = true

# ── root credentials ───────────────────────────────────────────────────────────

[[watch]]
name = "root-ssh"
path = "/root/.ssh"
allow_processes = [
    "/usr/bin/ssh",
    "/usr/bin/ssh-agent",
    "/usr/bin/ssh-add",
    "/usr/bin/git",
    "/usr/bin/scp",
    "/usr/bin/sftp",
]
recursive = true
